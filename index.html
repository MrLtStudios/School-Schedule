// Base schedule name (will be combined with lunch selection: e.g., "8PRD" + "-A" = "8PRD-A")

var selectedLunch = null;

// Manual selection flag
var isManual = false;

// Lunch auto-selected flag
var lunchAutoSelected = false;

// Manual reset flag
var manualReset = false;

// Just loaded schedule flag
var justLoadedSchedule = false;

// Current time from internet
var currentTime = null; // start as null
var timeOffset = 0;
var lastFetch = Date.now();

function fetchTime() {
    return fetch('https://timeapi.io/api/Time/current/zone?timeZone=America/Chicago')
        .then(response => response.json())
        .then(data => {
            var apiTime = new Date(data.dateTime);
            timeOffset = apiTime.getTime() - Date.now();
            lastFetch = Date.now();
            currentTime = apiTime;
        })
        .catch(err => {
            console.log('Error fetching time:', err);
            // Fallback to local time
            timeOffset = 0;
            currentTime = new Date();
        });
}

// Fetch time on load and every 30 seconds
fetchTime().then(() => {
    setInterval(showclock, 1000);
    showclock();
    setInterval(fetchTime, 30000);
});

// Schedule selector - change this to switch schedules - THIS will override the day-of-week schedule configuration below, so only change this if you want to force a specific schedule regardless of day of week
var currentSchedule = ''; // Leave empty to use day-of-week + lunch selection, or set to specific schedule like '8PRDWIN-A', 'weekend', 'noschool'

// Lunch selection event listeners
document.getElementById('lunchA').addEventListener('click', function() { selectLunch('A'); });
document.getElementById('lunchB').addEventListener('click', function() { selectLunch('B'); });
document.getElementById('lunchC').addEventListener('click', function() { selectLunch('C'); });

// Switch lunch link event listener
document.getElementById('switchLunchLink').addEventListener('click', function(e) {
    e.preventDefault();
    resetToLunchSelection();
});

// Manual schedule link event listener
document.getElementById('manualScheduleLink').addEventListener('click', function(e) {
    e.preventDefault();
    showManualScheduleSelector();
});

// Cancel manual selection
document.getElementById('cancelManualSelect').addEventListener('click', function() {
    hideManualScheduleSelector();
});

function resetToLunchSelection() {
    document.getElementById('lunchSelector').style.display = 'block';
    document.getElementById('mainContent').style.display = 'none';
    selectedLunch = null;
    // Keep the current baseScheduleName for switching lunch
    // baseScheduleName = isManual ? baseScheduleName : currentAutoBase;
    isManual = false;
    lunchAutoSelected = false;
    manualReset = true;
    document.querySelector('#lunchSelector h2').innerHTML = 'Select your lunch';
    document.getElementById('autoScheduleDisplay').innerHTML = 'Auto-selected schedule: <span id="autoScheduleName" style="font-weight: bold;"></span>. <a href="#" id="manualScheduleLink" style="color: #f9f9f9; text-decoration: underline;">Manually select a schedule...</a>';
    document.getElementById('autoScheduleDisplay').style.display = 'block';
    document.getElementById('lunchButtons').style.display = 'flex';
    hideManualScheduleSelector();
    // Re-add event listener for the new link
    document.getElementById('manualScheduleLink').addEventListener('click', function(e) {
        e.preventDefault();
        showManualScheduleSelector();
    });
}

function showManualScheduleSelector() {
    var currentAuto = document.getElementById('autoScheduleName').innerHTML;
    var scheduleButtons = document.getElementById('scheduleButtons');
    scheduleButtons.innerHTML = '';
    for (var displayName in manualSchedules) {
        var button = document.createElement('button');
        button.textContent = displayName;
        button.style.padding = '8px 12px';
        button.style.fontSize = '0.9em';
        button.style.backgroundColor = '#f5f5f5';
        button.style.color = '#333';
        button.style.border = 'none';
        button.style.borderRadius = '4px';
        button.style.cursor = 'pointer';
        button.style.fontFamily = "'Roboto', Arial, sans-serif";
        if (displayName === currentAuto) {
            button.disabled = true;
            button.style.opacity = '0.5';
            button.style.cursor = 'not-allowed';
        } else {
            button.onclick = (function(dn) {
                return function() { selectManual(dn); };
            })(displayName);
        }
        scheduleButtons.appendChild(button);
    }
    
    var selector = document.getElementById('manualScheduleSelector');
    selector.style.position = 'fixed';
    selector.style.top = '50%';
    selector.style.left = '50%';
    selector.style.transform = 'translate(-50%, -50%)';
    selector.style.zIndex = '1000';
    selector.style.backgroundColor = 'rgba(0,0,0,0.9)';
    selector.style.padding = '20px';
    selector.style.borderRadius = '10px';
    selector.style.color = '#f9f9f9';
    selector.style.display = 'block';
}

function hideManualScheduleSelector() {
    document.getElementById('manualScheduleSelector').style.display = 'none';
}

function selectManual(displayName) {
    var info = manualSchedules[displayName];
    if (info.type === 'lunch') {
        baseScheduleName = info.base;
        // Clear saved lunch for this schedule type
        localStorage.removeItem('lunch_' + info.base);
        selectedLunch = null;
        currentSchedule = '';
        isManual = true;
        hideManualScheduleSelector();
        document.querySelector('#lunchSelector h2').textContent = 'Select your lunch';
        document.getElementById('autoScheduleDisplay').innerHTML = 'Manually selected: <strong>' + displayName + '</strong>. <a href="#" id="revertAuto" style="color: #f9f9f9; text-decoration: underline;">Revert to auto-selection...</a>';
        document.getElementById('revertAuto').addEventListener('click', function(e) {
            e.preventDefault();
            resetToLunchSelection();
        });
    } else {
        currentSchedule = info.key;
        selectedLunch = null;
        isManual = true;
        hideManualScheduleSelector();
        document.getElementById('lunchSelector').style.display = 'none';
        document.getElementById('autoScheduleDisplay').innerHTML = 'Manually selected: <strong>' + displayName + '</strong>. <a href="#" id="revertAuto" style="color: #f9f9f9; text-decoration: underline;">Revert to auto-selection...</a>';
        document.getElementById('mainContent').style.display = 'block';
        loadScheduleData();
        showclock();
        document.getElementById('revertAuto').addEventListener('click', function(e) {
            e.preventDefault();
            resetToLunchSelection();
        });
    }
}

function getScheduleType(base) {
    return (base === 'ODDBLOCK' || base === 'EVENBLOCK') ? base : 'main';
}

function selectLunch(lunch) {
    selectedLunch = lunch;
    // Save lunch preference
    var scheduleType = getScheduleType(baseScheduleName);
    localStorage.setItem('lunch_' + scheduleType, lunch);
    manualReset = false;
    currentSchedule = ''; // Clear manual schedule selection when choosing lunch
    initializeSchedule();
    
    // Update schedule display name
    var scheduleName = baseScheduleName + '-' + lunch;
    var displayName = scheduleDisplayNames[scheduleName] || scheduleName;
    document.getElementById('scheduleDisplayName').innerHTML = 'Using <strong>' + displayName + ' (' + lunch + ' Lunch)</strong> schedule.';
    
    if (isManual) {
        document.getElementById('autoScheduleDisplay').innerHTML = 'Manually selected: <strong>' + displayName + ' (' + lunch + ' Lunch)</strong>. <a href="#" id="revertAuto" style="color: #f9f9f9; text-decoration: underline;">Revert to auto-selection...</a>';
        document.getElementById('lunchSelector').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        document.getElementById('lunchButtons').style.display = 'none';
        isManual = false;
        document.getElementById('revertAuto').addEventListener('click', function(e) {
            e.preventDefault();
            resetToLunchSelection();
        });
    } else {
        document.getElementById('lunchSelector').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
    }
}

function loadScheduleData() {
    // Determine which schedule to use based on day of week
    var now = new Date(Date.now() + timeOffset);
    var dayOfWeek = now.getDay(); // 0 = Sunday, 1 = Monday, etc.
    var scheduleName = daySchedules[dayOfWeek];

    // Apply date-specific overrides (MM/DD) before any other weekly logic
    var todayKey = ('0' + (now.getMonth() + 1)).slice(-2) + '/' + ('0' + now.getDate()).slice(-2);
    if (dateOverrides.hasOwnProperty(todayKey)) {
        scheduleName = dateOverrides[todayKey];
    }

    // Override with currentSchedule if specified and valid
    if (currentSchedule && (schedules.hasOwnProperty(currentSchedule) || specialSchedules.hasOwnProperty(currentSchedule))) {
        scheduleName = currentSchedule;
    } else if (selectedLunch) {

        scheduleName = baseScheduleName + '-' + selectedLunch;
    }

    isSpecialSchedule = specialSchedules.hasOwnProperty(scheduleName);

    // Update schedule display name
    if (document.getElementById('mainContent').style.display !== 'none') {
        var displayName = scheduleDisplayNames[scheduleName] || scheduleName;
        var lunchLetter = selectedLunch || (scheduleName.split('-')[1] || 'A');
        if (isSpecialSchedule) {
            document.getElementById('scheduleDisplayName').innerHTML = 'Using <strong>' + displayName + '</strong> schedule.';
        } else {
            document.getElementById('scheduleDisplayName').innerHTML = 'Using <strong>' + displayName + '</strong> (' + lunchLetter + ' Lunch) schedule.';
        }
    }

    // Load the selected schedule
    if (isSpecialSchedule) {
        // Special schedule - no periods to load
        names = [];
        times = [];
        starts = [];
        dispNames = [];
        tableNames = [];
    } else {
        var scheduleData = schedules[scheduleName];
        for (var i = 0; i < scheduleData.length; i++) {
            var periodName = scheduleData[i][0];
            var timeStr = scheduleData[i][1];

            // Convert time to seconds
            var timeParts = timeStr.split(':');
            var hours = parseInt(timeParts[0]);
            var minutes = parseInt(timeParts[1]);
            var seconds = hours * 3600 + minutes * 60;

            names[i] = periodName;
            times[i] = timeStr;
            starts[i] = seconds;
        }
    }

    // Generate display names
    for (var i = 0; i < names.length; i++) {
        var n = names[i];

        if (n === 'PassingTime' || n === 'EndOfSchool') {
            dispNames[i] = n;
            tableNames[i] = n;
            continue;
        }

        if (/^[A-Za-z]$/.test(n)) {
            dispNames[i] = n + ' Lunch';
            tableNames[i] = n + ' Lunch';
            continue;
        }

        var m = n.match(/^(\d+)([A-Za-z]?)$/i);
        if (m) {
            var num = parseInt(m[1], 10);
            var suffix = m[2].toUpperCase();

            if (suffix) {
                dispNames[i] = num + suffix + ' Hour';
                tableNames[i] = num + suffix;
                continue;
            }

            var ordinal = 'th';
            if (!(num % 100 >= 11 && num % 100 <= 13)) {
                if (num % 10 == 1) ordinal = 'st';
                else if (num % 10 == 2) ordinal = 'nd';
                else if (num % 10 == 3) ordinal = 'rd';
            }

            dispNames[i] = num + ordinal + ' Hour';
            tableNames[i] = '' + num;
            continue;
        }

        dispNames[i] = n;
        tableNames[i] = n;
    }
}

function calculateDaysLeft(endDate, currentDate) {
    var count = 0;
    var current = new Date(currentDate);
    current.setHours(0, 0, 0, 0); // normalize
    var end = new Date(endDate);
    end.setHours(0, 0, 0, 0);
    while (current <= end) {
        var dayOfWeek = current.getDay();
        var mmdd = ('0' + (current.getMonth() + 1)).slice(-2) + '/' + ('0' + current.getDate()).slice(-2);
        var override = dateOverrides[mmdd];
        if (dayOfWeek !== 0 && dayOfWeek !== 6 && override !== 'noschool') {
            count++;
        }
        current.setDate(current.getDate() + 1);
    }
    return count;
}

					var hour = parseInt(hc);
					disptimex=hour+disptimex.substring(2,5)+' PM';
				}
			
			ts=ts+"<td style='padding:8px'>"+tableNames[x]+"</td><td style='padding:8px'>"+disptime+"</td><td style='padding:8px'>"+disptimex+"</td></tr>";
			
			if (x==curperiod){
				watt=disptime+' &ndash; '+disptimex;
				_('wearenowtimerange').innerHTML=watt.replace(/0(.)\:/g,'$1:');
			}
		}
		
		var disptimez=times[perc-1];
		if (disptimez.substring(0,2)<12){
			var hour = parseInt(disptimez.substring(0,2));
			disptimez=hour+disptimez.substring(2,5)+' AM';
		}else{
			hc=disptimez.substring(0,2);
			if (hc>12){hc=hc-12};
			var hour = parseInt(hc);
			disptimez=hour+disptimez.substring(2,5)+' PM';
		}
		
		if (!names[perc-1].includes('EndOfSchool')) {
			ts=ts+"<tr><td style='padding:8px'>"+tableNames[perc-1]+"</td><td style='padding:8px'>"+disptimez+"</td><td style='padding:8px'>-</td></tr>";
		}
		ts=ts+"</table></div></div>";
		}
		_("schedule").innerHTML=ts;
	}
    
    delete window.d;
}
function omb(hhmm){

    var ch=hhmm.substr(0,2);
    var cm=hhmm.substr(3,2);
    //if (ch<10){ch='0'+ch}
    if (ch==0){ch='00';}
    //if (cm<10){cm='0'+cm}
    if (cm==0){cm='00';}
    return ch+':'+cm;
}
function secondstohhmmss(secs){
    var h=parseInt(secs/3600);
	if (h<10){h='0'+h}
    if (h==0){h='00'}
    
    var secs=(secs-(h*3600));
    var m=parseInt(secs/60);
    if (m<10){m='0'+m}
    if (m==0){m='00'}    
    var secs=parseInt(secs-(m*60));
    
    var s=secs;
    if (s<10){s='0'+s}
    if (h!='00'){
        return h+':'+m+':'+s;
    }else if(m!='00'){
        return m+':'+s;    
    }else{
        return s;    
    }
}

<script>
(() => {

/* ================= BUTTONS ================= */
const noteBtn = document.getElementById("uiNoteBtn");
const lunchBtn = document.getElementById("uiLunchBtn");

const notesContainer = document.getElementById("uiNotesContainer");
const lunchWindow = document.getElementById("uiLunchWindow");

noteBtn.addEventListener("click", createNote);
lunchBtn.addEventListener("click", () => {
  lunchWindow.style.display =
    lunchWindow.style.display === "block" ? "none" : "block";
});

/* ================= SAFE DRAG (NO GLOBAL CONFLICTS) ================= */
function makeDraggable(el, handle){
  let offsetX=0, offsetY=0, dragging=false;

  handle.addEventListener("mousedown", (e)=>{
    dragging=true;
    offsetX=e.clientX - el.offsetLeft;
    offsetY=e.clientY - el.offsetTop;
  });

  document.addEventListener("mousemove", (e)=>{
    if(!dragging) return;
    el.style.left=(e.clientX-offsetX)+"px";
    el.style.top=(e.clientY-offsetY)+"px";
  });

  document.addEventListener("mouseup", ()=>{
    dragging=false;
  });
}

/* ================= NOTES ================= */
function createNote(){
  spawnNote("", 200, 200);
  saveNotes();
}

function spawnNote(text, x, y){
  const note=document.createElement("div");
  note.className="ui-note";
  note.style.left=x+"px";
  note.style.top=y+"px";

  note.innerHTML=`
    <div class="ui-note-header">
      <button class="delete">X</button>
    </div>
    <textarea>${text}</textarea>
  `;

  notesContainer.appendChild(note);

  const textarea = note.querySelector("textarea");
  const del = note.querySelector(".delete");

  textarea.addEventListener("input", saveNotes);

  del.addEventListener("click", ()=>{
    note.remove();
    saveNotes();

  });

  makeDraggable(note, note.querySelector(".ui-note-header"));
}

function saveNotes(){
  const all=[];

  document.querySelectorAll(".ui-note").forEach(note=>{
    all.push({
      text: note.querySelector("textarea").value,
      x: parseInt(note.style.left),
      y: parseInt(note.style.top)
    });
  });

  localStorage.setItem("notes", JSON.stringify(all));
}

window.addEventListener("load", ()=>{
  const saved = JSON.parse(localStorage.getItem("notes") || "[]");

  saved.forEach(n=>{
    spawnNote(n.text, n.x, n.y);
  });
});

/* ================= LUNCH MENU ================= */
const menu={
  1:{breakfast:["NO SCHOOL"],lunch:["NO SCHOOL"]},
  2:{breakfast:["French Toast","Cereal"],lunch:["Pizza","Nuggets"]},
  3:{breakfast:["Bagel","Fruit"],lunch:["Chicken","Pizza"]},
  4:{breakfast:["Breakfast Burrito","Frosted Long John","Choice of Cereal","Fun with D&J Crackers","Fruit","Milk"],lunch:["Stuffed Shells","Pizza Dippers w/Marinara","Popcorn Chicken","French Fries","Homemade Pizza","Meatlover's Pizza","Build Your Own Sub","Turkey BLT Salad"]},
  5:{breakfast:["Test"],lunch:["Stuffed Shells","Pizza Dippers w/Marinara","Popcorn Chicken","French Fries","Homemade Pizza","Meatlover's Pizza","Build Your Own Sub","Turkey BLT Salad"]}
};

const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const today=new Date().getDay();

document.getElementById("uiDay").innerText=days[today];

function loadMenu(){
  const b=document.getElementById("uiBreakfast");
  const l=document.getElementById("uiLunch");

  b.innerHTML="";
  l.innerHTML="";

  if(!menu[today]) return;

  menu[today].breakfast.forEach(i=>{
    const d=document.createElement("div");
    d.innerText=i;
    b.appendChild(d);
  });

  menu[today].lunch.forEach(i=>{
    const d=document.createElement("div");
    d.innerText=i;
    l.appendChild(d);
  });
}
loadMenu();

/* draggable lunch */
makeDraggable(lunchWindow, document.getElementById("uiLunchHeader"));

document.getElementById("uiCloseLunch").onclick=()=>{
  lunchWindow.style.display="none";
};

})();
</script>
